services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: eigen
      POSTGRES_PASSWORD: eigen
      POSTGRES_DB: eigen
    ports:
      - "5432:5432"
    volumes:
      - eigen_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eigen"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

volumes:
  eigen_pg:
